name: Deploy Jekyll with Typst PDFs

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Typst
        run: sudo snap install typst

      - name: Compile Typst PDFs
        run: |
          mkdir -p ./site/docs
          
          # Compila i file .typ dalla cartella esterna ./docs
          for file in ./docs/*.typ; do
            [ -e "$file" ] || continue
            filename=$(basename "$file" .typ)
            echo "Compiling $file..."
            typst compile "$file" "./site/docs/$filename.pdf"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./site
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5