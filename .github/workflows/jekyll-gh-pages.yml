name: Deploy Jekyll with Typst PDFs

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Typst
        run: sudo snap install typst

      - name: Compile and Inject PDFs
        run: |
          # 1. Crea la cartella assets/pdf dentro la sorgente 'site'
          mkdir -p ./site/assets/pdf
          
          # 2. Forza la creazione di un file .nojekyll
          touch ./site/.nojekyll
          
          # 3. Compila i file .typ dalla cartella esterna alla cartella assets
          for file in ./docs/*.typ; do
            [ -e "$file" ] || continue
            filename=$(basename "$file" .typ)
            echo "Compiling $file to ./site/assets/pdf/$filename.pdf"
            typst compile "$file" "./site/assets/pdf/$filename.pdf"
          done
          
          # 4. Verifica finale nei log della Action
          ls -R ./site/assets/pdf/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./site
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5