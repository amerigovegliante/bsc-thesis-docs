name: Deploy Jekyll with Typst PDFs

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Typst
        run: sudo snap install typst

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./site
          destination: ./_site

      # COPIAMO I PDF DOPO LA BUILD DI JEKYLL
      - name: Inject Typst PDFs into final site
        run: |
          # Crea la cartella direttamente nel pacchetto pronto per il deploy
          mkdir -p ./_site/assets/pdf
          
          # Compila i file e mettili direttamente in _site
          for file in ./docs/*.typ; do
            [ -e "$file" ] || continue
            filename=$(basename "$file" .typ)
            echo "Compiling $file directly to final destination..."
            typst compile "$file" "./_site/assets/pdf/$filename.pdf"
          done
          
          # Verifica finale: se non vedi file qui, il comando find non trova la cartella ./docs
          ls -R ./_site/assets/pdf/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5