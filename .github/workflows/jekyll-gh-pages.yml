name: Deploy Jekyll with Typst PDFs

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Typst
        uses: chiyadev/setup-typst@v1

      - name: Compile Typst files
        run: |
          # Creiamo la cartella DENTRO la sorgente di Jekyll
          mkdir -p ./site/assets/pdf
          
          # Cerchiamo i .typ e salviamoli nella cartella assets del sito
          for file in $(find . -name "*.typ"); do
            filename=$(basename "$file" .typ)
            typst compile "$file" "./site/assets/pdf/$filename.pdf"
          done
          
          # Debug: stampa i file creati per sicurezza nei log
          ls -R ./site/assets/pdf

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./site
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5